name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exiur-${{ runner.os }}
          path: dist/exiur*

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Android ARM64 via Termux Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace ubuntu:24.04 bash -c "
            apt-get update && apt-get install -y curl python3 python3-pip python3-venv &&
            cd /workspace &&
            python3 -m venv .venv &&
            . .venv/bin/activate &&
            pip install -e '.[build]' &&
            python build.py &&
            chmod 755 dist/exiur
          "

      - name: Rename binary
        run: cp dist/exiur dist/exiur-android-arm64 && chmod +x dist/exiur-android-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exiur-Android
          path: dist/exiur-android-arm64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/exiur-Linux/exiur release/exiur-linux
          cp artifacts/exiur-Windows/exiur.exe release/exiur-windows.exe
          cp artifacts/exiur-macOS/exiur release/exiur-macos
          cp artifacts/exiur-Android/exiur-android-arm64 release/exiur-android-arm64
          chmod +x release/exiur-linux release/exiur-macos release/exiur-android-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/exiur-linux
            release/exiur-windows.exe
            release/exiur-macos
            release/exiur-android-arm64
          generate_release_notes: true
